services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: hyperxp-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false          # set this manually in the Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false          # set to your frontend URL after it's deployed

  # ── Frontend (React/Vite static site) ─────────────────────────────────────
  - type: web
    name: hyperxp-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # set to your backend URL after it's deployed
